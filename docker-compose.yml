services:
  postgres:
    image: postgres:15
    container_name: instapilot_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: instapilot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - instapilot_network

  redis:
    image: redis:7-alpine
    container_name: instapilot_redis
    ports:
      - "6379:6379"
    networks:
      - instapilot_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: instapilot_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/instapilot_db
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379
      CELERY_RESULT_BACKEND: redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - instapilot_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: instapilot_celery_worker
    command: celery -A app.worker worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/instapilot_db
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379
      CELERY_RESULT_BACKEND: redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - instapilot_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: instapilot_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - instapilot_network

networks:
  instapilot_network:
    driver: bridge

volumes:
  postgres_data:
